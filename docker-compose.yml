version: '3.8'

services:
  # ── PostgreSQL Database ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: naac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: naac_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API Server ──────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: naac-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/naac_db
      JWT_SECRET: ${JWT_SECRET:-naac-fms-super-secret-key-2024}
      JWT_EXPIRES_IN: 24h
      PORT: 5000
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: 10485760
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads

  # ── Frontend (React/Nginx) ─────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: naac-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
